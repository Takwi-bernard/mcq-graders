<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Create Account | SmartGrade</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
        rel="stylesheet">

    <link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- LEFT -->

<div class="col-lg-6 auth-left">

<div class="logo">

Smart<span>Grade</span>

</div>

<h1>Join SmartGrade</h1>

<p>

Create your account and enjoy automated
MCQ assessment and grading.

</p>

<div class="features">

<div class="feature">

<i class="bi bi-person-check"></i>

<span>Student & Admin Access</span>

</div>

<div class="feature">

<i class="bi bi-lightning"></i>

<span>Fast Assessment</span>

</div>

<div class="feature">

<i class="bi bi-bar-chart"></i>

<span>Instant Reports</span>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="col-lg-6 auth-right">
<div class="d-lg-none text-center mb-4">

<h2 class="logo">

Smart<span>Grade</span>

</h2>

</div>
<div class="auth-card">

<h2>Create Account</h2>

<p>Create your SmartGrade account.</p>

<form id="registerForm">

<div class="mb-3">

<label class="form-label">

Full Name

</label>

<input
type="text"
class="form-control"
id="fullName"
required>

</div>

<div class="mb-3">

<label class="form-label">

Email

</label>

<input
type="email"
class="form-control"
id="email"
required>

</div>

<div class="mb-3">

<label class="form-label">

Role

</label>

<select
class="form-control"
id="role"
required>

<option value="student">

Student

</option>

<option value="admin">

Admin

</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<input
type="password"
class="form-control"
id="password"
required>

</div>

<div class="mb-3">

<label class="form-label">

Confirm Password

</label>

<input
type="password"
class="form-control"
id="confirmPassword"
required>

</div>

<button
class="btn-login"
type="submit">

<i class="bi bi-person-plus"></i>

Register

</button>

</form>

<div id="registerMessage"
class="mt-3">

</div>

<div class="divider">

OR

</div>

<div class="bottom-link">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="../config/supabase.js"></script>

<script type="module" src="../shared/js/services/authService.js"></script>

<script type="module" src="js/register.js"></script>

</body>

</html>

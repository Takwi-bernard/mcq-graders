<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forgot Password | SmartGrade</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
rel="stylesheet">

<link rel="stylesheet"
href="css/auth.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- LEFT -->

<div class="col-lg-6 auth-left">

<div class="logo">

Smart<span>Grade</span>

</div>

<h1>Password Recovery</h1>

<p>

Recover your account securely and continue
using SmartGrade.

</p>

<div class="features">

<div class="feature">

<i class="bi bi-shield-lock"></i>

<span>Secure Reset</span>

</div>

<div class="feature">

<i class="bi bi-envelope"></i>

<span>Email Verification</span>

</div>

<div class="feature">

<i class="bi bi-check-circle"></i>

<span>Fast Recovery</span>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="col-lg-6 auth-right">

<div class="auth-card">

<h2>Forgot Password</h2>

<p>

Enter your email to receive a reset link.

</p>

<form id="forgotForm">

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<input
type="email"
class="form-control"
id="email"
required>

</div>

<button
type="submit"
class="btn-login">

<i class="bi bi-envelope"></i>

Send Reset Link

</button>

</form>

<div
id="forgotMessage"
class="mt-3">

</div>

<div class="divider">

OR

</div>

<div class="bottom-link">

<a href="login.html">

Back to Login

</a>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="../config/supabase.js"></script>

<script type="module" src="../shared/js/services/authService.js"></script>

<script type="module" src="js/forgot-password.js"></script>

</body>

</html>
